<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Men Zone – עוזר דיגיטלי</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #080f14; color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; }
    header { background: #0d2330; padding: 15px; text-align: center; border-bottom: 1px solid #a8d8ea33; font-weight: bold; color: #6bb8d4; }
    #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .msg { padding: 12px 16px; border-radius: 15px; max-width: 85%; font-size: 15px; line-height: 1.5; }
    .bot { background: #1a3a4a; align-self: flex-start; border-bottom-left-radius: 2px; }
    .user { background: #2c5a71; align-self: flex-end; border-bottom-right-radius: 2px; color: #a8d8ea; }
    .input-area { padding: 15px; background: #0d2330; display: flex; gap: 10px; border-top: 1px solid #a8d8ea22; }
    input { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #a8d8ea44; background: #080f14; color: white; outline: none; }
    button { padding: 10px 22px; border-radius: 10px; border: none; background: #6bb8d4; color: #080f14; font-weight: bold; cursor: pointer; }
    #error-msg { color: #ff6b6b; font-size: 13px; text-align: center; padding: 10px; background: rgba(255,107,107,0.1); margin: 10px; border-radius: 8px; }
    .hidden { display: none !important; }
    a { color: #6bb8d4; text-decoration: underline; }
  </style>
</head>
<body>
  <header>MEN ZONE</header>
  <div id="chat"></div>
  <div id="error-msg" class="hidden"></div>
  <div class="input-area">
    <input type="text" id="userInput" placeholder="כתוב הודעה..." onkeypress="if(event.key==='Enter') send()">
    <button id="sendBtn" onclick="send()">שלח</button>
  </div>
<script>
  let history = [];
  function addMsg(role, text) {
    const d = document.getElementById('chat'); const m = document.createElement('div'); m.className = 'msg ' + role;
    m.innerHTML = text.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank">$1</a>').replace(/\n/g, '<br>');
    d.appendChild(m); d.scrollTop = d.scrollHeight;
  }
  window.onload = () => addMsg('bot', 'שלום! כאן העוזר של <strong>Men Zone</strong>. איך אפשר לעזור?');

  async function send() {
    const i = document.getElementById('userInput'); const btn = document.getElementById('sendBtn'); const t = i.value.trim(); if(!t || btn.disabled) return;
    i.value = ''; addMsg('user', t); history.push({role:'user', content:t});
    btn.disabled = true; document.getElementById('error-msg').classList.add('hidden');
    try {
      const r = await fetch('/api/chat', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history })
      });
      const data = await r.json(); if(data.error) throw new Error(data.error);
      const reply = data.content[0].text; addMsg('bot', reply); history.push({role:'assistant', content:reply});
    } catch(e) { document.getElementById('error-msg').innerText = 'שגיאה: ' + e.message; document.getElementById('error-msg').classList.remove('hidden'); }
    finally { btn.disabled = false; }
  }
</script>
</body>
</html>
